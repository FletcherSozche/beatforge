<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BeatForge" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="description" content="BeatForge - Drum n Bass, Dubstep ve daha fazlasi icin sezgisel muzik uretim stüdyosu" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>BeatForge - Music Studio</title>
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7c5cff" />
            <stop offset="100%" stop-color="#00d4ff" />
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="56" fill="none" stroke="url(#g1)" stroke-width="4" />
        <path d="M40 35 L40 85 L70 60 Z" fill="url(#g1)" />
        <rect x="78" y="35" width="6" height="50" fill="url(#g1)" />
      </svg>
    </div>
    <div class="splash-title">BeatForge</div>
    <div class="splash-sub">Beat ureticisi yukleniyor...</div>
  </div>

  <div id="app" class="app hidden">
    <!-- TOP BAR -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-text">
          <div class="brand-name">BeatForge</div>
          <div class="brand-sub" id="project-name">Yeni Proje</div>
        </div>
      </div>

      <div class="transport">
        <button class="btn-icon" id="btn-play" title="Calistir / Durdur" aria-label="Calistir">
          <svg viewBox="0 0 24 24" class="ico-play"><path d="M8 5v14l11-7z"/></svg>
          <svg viewBox="0 0 24 24" class="ico-pause"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button class="btn-icon" id="btn-stop" title="Durdur" aria-label="Durdur">
          <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
        </button>
        <button class="btn-icon" id="btn-rec" title="Kayit" aria-label="Kayit">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg>
        </button>
        <div class="bpm-control">
          <button class="bpm-btn" id="bpm-down" aria-label="BPM azalt">−</button>
          <div class="bpm-display">
            <input type="number" id="bpm-input" min="40" max="240" value="174" />
            <span class="bpm-label">BPM</span>
          </div>
          <button class="bpm-btn" id="bpm-up" aria-label="BPM arttir">+</button>
        </div>
        <button class="btn-icon btn-metronome" id="btn-metronome" title="Metronome" aria-label="Metronome">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2L4 21h16L12 2zm0 4l5.5 13h-11L12 6zM11 12v5h2v-5h-2z" fill="currentColor"/></svg>
        </button>
        <div class="swing-control">
          <label>SWING <span id="swing-value">50%</span></label>
          <input type="range" id="swing-slider" class="swing-slider" min="50" max="75" value="50" step="1" />
        </div>
        <button class="tap-tempo-btn" id="tap-tempo" title="Tempo olcmek icin tempo ile tikla (Space)">TAP</button>
        <div class="position-display" id="position-display">1.1.1</div>
      </div>

      <div class="topbar-actions">
        <button class="btn-ghost" id="btn-presets" title="Tarz Onayarlari">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 18l-10-5v-3l10 5 10-5v3l-10 5z"/></svg>
          <span>Tarzlar</span>
        </button>
        <button class="btn-ghost" id="btn-save" title="Kaydet">
          <svg viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4zm-5 16a3 3 0 110-6 3 3 0 010 6zm3-10H5V5h10v4z"/></svg>
          <span>Kaydet</span>
        </button>
        <button class="btn-ghost" id="btn-open" title="Son Projeler">
          <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          <span>Ac</span>
        </button>
        <button class="btn-ghost" id="btn-demo" title="Demo Proje">DEMO</button>
        <button class="btn-ghost" id="btn-help" title="Yardim">?</button>
        <button class="btn-ghost" id="btn-export" title="Disa Aktar">
          <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM12 4l-7 7h4v6h6v-6h4l-7-7z" transform="rotate(180 12 12)"/></svg>
          <span>Aktar</span>
        </button>
        <button class="btn-ghost" id="btn-midi-export" title="MIDI Export">MIDI</button>
        <button class="btn-ghost btn-menu" id="btn-menu" title="Menu" aria-label="Menu">
          <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zM3 13h18v-2H3v2zM3 6v2h18V6H3z"/></svg>
        </button>
      </div>
    </header>

    <!-- MAIN WORKSPACE -->
    <main class="workspace">
      <!-- SEQUENCER -->
      <section class="panel sequencer-panel">
        <div class="panel-head">
          <div class="panel-title">
            <span class="panel-dot"></span>
            Pattern Editor
          </div>
          <div class="panel-actions">
            <div class="seg">
              <button class="seg-btn active" data-bars="1">1</button>
              <button class="seg-btn" data-bars="2">2</button>
              <button class="seg-btn" data-bars="4">4</button>
              <button class="seg-btn" data-bars="8">8</button>
              <button class="seg-btn" data-bars="16">16</button>
              <button class="seg-btn" data-bars="32">32</button>
              <button class="seg-btn" data-bars="64">64</button>
              <button class="seg-btn" data-bars="128">128</button>
            </div>
            <button class="btn-mini" id="btn-undo" title="Geri al (Ctrl+Z)">↶</button>
            <button class="btn-mini" id="btn-redo" title="Ileri al (Ctrl+Shift+Z)">↷</button>
            <button class="btn-mini" id="btn-ab" title="A/B Pattern Karsilastir">A/B</button>
            <button class="btn-mini" id="btn-copy" title="Secili hucreleri kopyala (Ctrl+C)">Kopyala</button>
            <button class="btn-mini" id="btn-paste" title="Yapistir (Ctrl+V)">Yapistir</button>
            <button class="btn-mini" id="btn-dupbar" title="Aktif Bari Tum Kanallara Kopyala">Bar Kopyala</button>
            <button class="btn-mini" id="btn-clear" title="Pattern Temizle">Temizle</button>
            <button class="btn-mini" id="btn-randomize" title="Rastgele">Rastgele</button>
          </div>
        </div>
        <div class="sequencer" id="sequencer"></div>
        <div class="spectrum-mount" id="spectrum-mount"></div>
      </section>

      <!-- TABS: MIXER / EFFECTS / ARRANGE -->
      <section class="panel tabs-panel">
        <div class="tabs">
          <button class="tab active" data-tab="mixer">Mixer</button>
          <button class="tab" data-tab="effects">Efektler</button>
          <button class="tab" data-tab="synth">Synth</button>
          <button class="tab" data-tab="vocal">Vokal</button>
          <button class="tab" data-tab="samples">Sample</button>
          <button class="tab" data-tab="templates">Sablonlar</button>
          <button class="tab" data-tab="arrange">Arrange</button>
        </div>

        <div class="tab-panel active" data-panel="mixer" id="mixer-panel"></div>
        <div class="tab-panel" data-panel="effects" id="effects-panel"></div>
        <div class="tab-panel" data-panel="synth" id="synth-panel"></div>
        <div class="tab-panel" data-panel="vocal" id="vocal-panel"></div>
        <div class="tab-panel" data-panel="samples" id="samples-panel"></div>
        <div class="tab-panel" data-panel="templates" id="templates-panel"></div>
        <div class="tab-panel" data-panel="arrange" id="arrange-panel">
          <div class="arrange-info">
            <h3>Song Arrange</h3>
            <p>Pattern'larini sirala, intro/drop/break bolumleri olustur. Yakinda gelecek.</p>
          </div>
        </div>
      </section>
    </main>

    <!-- BOTTOM BAR (mobile transport) -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="grid">
        <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg>
        <span>Grid</span>
      </button>
      <button class="nav-btn" data-view="mixer">
        <svg viewBox="0 0 24 24"><path d="M7 3v18M12 3v12M17 3v8M5 17h4M10 13h4M15 9h4"/></svg>
        <span>Mixer</span>
      </button>
      <button class="nav-btn nav-play" id="nav-play">
        <svg viewBox="0 0 24 24" class="ico-play"><path d="M8 5v14l11-7z"/></svg>
        <svg viewBox="0 0 24 24" class="ico-pause"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button class="nav-btn" data-view="fx">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16zm0-14a6 6 0 100 12 6 6 0 000-12z"/></svg>
        <span>FX</span>
      </button>
      <button class="nav-btn" data-view="lib">
        <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zM4 11h16v2H4zM4 16h16v2H4z"/></svg>
        <span>Tarz</span>
      </button>
    </nav>

    <!-- MODALS -->
    <div class="modal" id="modal-presets">
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card">
        <div class="modal-head">
          <h2>Tarz Onayarlari</h2>
          <button class="modal-close" data-close aria-label="Kapat">×</button>
        </div>
        <div class="modal-body" id="presets-list"></div>
      </div>
    </div>

    <div class="modal" id="modal-menu">
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card">
        <div class="modal-head">
          <h2>Menu</h2>
          <button class="modal-close" data-close aria-label="Kapat">×</button>
        </div>
        <div class="modal-body">
          <button class="menu-item" id="menu-new">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zM13 9V3.5L18.5 9H13z"/></svg>
            <span>Yeni Proje</span>
          </button>
          <button class="menu-item" id="menu-open">
            <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
            <span>Proje Ac</span>
          </button>
          <button class="menu-item" id="menu-save">
            <svg viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4zM12 19a3 3 0 110-6 3 3 0 010 6zM15 9H5V5h10v4z"/></svg>
            <span>Kaydet</span>
          </button>
          <button class="menu-item" id="menu-export">
            <svg viewBox="0 0 24 24"><path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zM12 2L7.5 6.5l1.4 1.4L11 5.8V16h2V5.8l2.1 2.1 1.4-1.4L12 2z"/></svg>
            <span>WAV Disa Aktar</span>
          </button>
          <button class="menu-item" id="menu-midi">
            <svg viewBox="0 0 24 24"><path d="M12 3L3 8v8l3 1.5V11l6 3 6-3v6.5l3-1.5V8l-9-5zm0 4.5L9.5 9.5l2.5 1.5 2.5-1.5L12 7.5z"/></svg>
            <span>MIDI Export</span>
          </button>
          <button class="menu-item" id="menu-stems">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
            <span>Stem Export (Track WAV)</span>
          </button>
          <hr />
          <button class="menu-item" id="menu-demo">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <span>Demo Proje (Neon Pulse)</span>
          </button>
          <button class="menu-item" id="menu-help">
            <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2c0-3 2-3 2-4 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.2 1.8-4 4-4s4 1.8 4 4c0 1.5-1.3 2.3-2 2.8z"/></svg>
            <span>Yardim</span>
          </button>
          <button class="menu-item" id="menu-about">
            <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span>Hakkinda</span>
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast-host" id="toast-host"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
