<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a2138"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="180" fill="none" stroke="url(#accent)" stroke-width="10" opacity="0.35"/>
    <circle cx="256" cy="256" r="140" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.6"/>
  </g>

  <path d="M 180 150 L 180 362 L 360 256 Z" fill="url(#accent)"/>

  <g transform="translate(376,150)">
    <rect x="0" y="0" width="18" height="60" rx="9" fill="url(#accent)"/>
    <rect x="0" y="76" width="18" height="80" rx="9" fill="url(#accent)" opacity="0.85"/>
    <rect x="0" y="172" width="18" height="40" rx="9" fill="url(#accent)" opacity="0.6"/>
  </g>
</svg>
