<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02040a"/>
      <stop offset="50%" stop-color="#0a1024"/>
      <stop offset="100%" stop-color="#10183a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b400ff"/>
      <stop offset="100%" stop-color="#ff00d4"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#b400ff"/>
      <stop offset="100%" stop-color="#ff00d4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strong-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#grid)"/>

  <g opacity="0.5" filter="url(#strong-glow)">
    <polygon points="256,80 432,176 432,336 256,432 80,336 80,176" fill="none" stroke="url(#cyan)" stroke-width="2"/>
  </g>

  <g filter="url(#glow)" opacity="0.7">
    <polygon points="256,120 392,196 392,316 256,392 120,316 120,196" fill="none" stroke="url(#purple)" stroke-width="1.5"/>
  </g>

  <g filter="url(#strong-glow)">
    <path d="M 196 184 L 196 328 L 332 256 Z" fill="url(#play)"/>
  </g>

  <g transform="translate(348,184)">
    <rect x="0" y="0" width="22" height="60" rx="11" fill="url(#cyan)" filter="url(#glow)"/>
    <rect x="0" y="74" width="22" height="80" rx="11" fill="url(#cyan)" opacity="0.85"/>
    <rect x="0" y="168" width="22" height="44" rx="11" fill="url(#cyan)" opacity="0.65"/>
  </g>

  <g opacity="0.6" filter="url(#glow)">
    <circle cx="256" cy="256" r="200" fill="none" stroke="url(#cyan)" stroke-width="1" stroke-dasharray="4 8"/>
  </g>

  <g font-family="monospace" font-size="22" font-weight="700" fill="#00f0ff" opacity="0.9">
    <text x="256" y="468" text-anchor="middle" letter-spacing="6">BEATFORGE</text>
  </g>
</svg>
